spring:
  application:
    name: marketplace.fullstack
  profiles:
    active:
      - dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE #o h2 funcionará com modo de compatibilidade com o postgres
    driver-class-name: org.h2.Driver
    username: usr
    password: 
  h2:
    console:
      enabled: true
  flyway:
    baseline-on-migrate: true
---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    properties:
     hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
  datasource:
    url: jdbc:postgresql://${DATABASE_URL}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true